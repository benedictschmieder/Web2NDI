<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1525"/>
      <stop offset="1" stop-color="#0A0F1C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#page)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint broadcast waves emanating to the right -->
  <g fill="none" stroke="#22D3EE" stroke-opacity="0.10" stroke-width="2">
    <path d="M250 320 A180 180 0 0 1 250 320"/>
    <path d="M1040 320 m-360 0 a360 360 0 1 0 720 0 a360 360 0 1 0 -720 0" stroke-opacity="0.05"/>
    <path d="M1040 320 m-480 0 a480 480 0 1 0 960 0 a480 480 0 1 0 -960 0" stroke-opacity="0.04"/>
    <path d="M1040 320 m-600 0 a600 600 0 1 0 1200 0 a600 600 0 1 0 -1200 0" stroke-opacity="0.03"/>
  </g>

  <!-- accent rule top -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#badge)"/>

  <!-- logo badge -->
  <g transform="translate(120,200) scale(0.94)">
    <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#badge)"/>
    <g transform="translate(-6,0)" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round">
      <path d="M119.1 93.33 A44 44 0 0 1 119.1 162.67"/>
      <path d="M137.56 69.69 A74 74 0 0 1 137.56 186.31"/>
      <path d="M156.03 46.05 A104 104 0 0 1 156.03 209.95"/>
    </g>
    <circle cx="86" cy="128" r="17" fill="#ffffff"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="430" y="300" font-size="132" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Web2NDI</text>
    <text x="436" y="372" font-size="36" font-weight="400" fill="#9CA3AF">Turn any web page into a live NDI&#174; video source</text>

    <!-- feature chips -->
    <g font-size="26" font-weight="600">
      <g transform="translate(436,420)">
        <rect x="0" y="0" width="290" height="52" rx="26" fill="#1E293B" stroke="#334155" stroke-width="1"/>
        <text x="145" y="34" fill="#CBD5E1" text-anchor="middle">Transparent overlays</text>
      </g>
      <g transform="translate(742,420)">
        <rect x="0" y="0" width="200" height="52" rx="26" fill="#1E293B" stroke="#334155" stroke-width="1"/>
        <text x="100" y="34" fill="#CBD5E1" text-anchor="middle">60 fps capture</text>
      </g>
      <g transform="translate(958,420)">
        <rect x="0" y="0" width="190" height="52" rx="26" fill="#1E293B" stroke="#334155" stroke-width="1"/>
        <text x="95" y="34" fill="#CBD5E1" text-anchor="middle">Multi-stream</text>
      </g>
    </g>
  </g>
</svg>
